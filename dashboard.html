<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Dashboard — Suivi des Participants</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent-fire: #ff6b35;
            --accent-green: #2ecc71;
            --accent-yellow: #f39c12;
            --accent-red: #e74c3c;
            --accent-blue: #3498db;
            --text-primary: #ecf0f1;
            --text-secondary: #bdc3c7;
            --border: #2c3e50;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-hover: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --primary: #ffffff;
            --secondary: #f8f9fa;
            --accent-fire: #ff6b35;
            --accent-green: #2ecc71;
            --accent-yellow: #f39c12;
            --accent-red: #e74c3c;
            --accent-blue: #3498db;
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --border: #ddd;
            --glass: rgba(0, 0, 0, 0.03);
            --glass-hover: rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 107, 53, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(52, 152, 219, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            margin-bottom: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(120deg, var(--accent-fire) 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-toggle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1.5rem;
        }

        .theme-toggle:hover {
            background: var(--glass-hover);
            transform: rotate(20deg);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: cardFade 0.6s ease-out forwards;
        }

        @keyframes cardFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }
        .stat-card:nth-child(5) { animation-delay: 0.5s; }

        .stat-card:hover {
            background: var(--glass-hover);
            border-color: var(--accent-blue);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(52, 152, 219, 0.1);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        .member-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .engagement-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .engagement-badge.feu {
            background: rgba(255, 107, 53, 0.2);
            color: var(--accent-fire);
            border: 1px solid var(--accent-fire);
        }

        .engagement-badge.engagement {
            background: rgba(46, 204, 113, 0.2);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .engagement-badge.fading {
            background: rgba(243, 156, 18, 0.2);
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
        }

        .engagement-badge.ghost {
            background: rgba(231, 76, 60, 0.2);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .stat-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .progress-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            position: relative;
        }

        .progress-circle.feu {
            background: rgba(255, 107, 53, 0.15);
            color: var(--accent-fire);
            box-shadow: inset 0 0 0 2px var(--accent-fire);
        }

        .progress-circle.engagement {
            background: rgba(46, 204, 113, 0.15);
            color: var(--accent-green);
            box-shadow: inset 0 0 0 2px var(--accent-green);
        }

        .progress-circle.fading {
            background: rgba(243, 156, 18, 0.15);
            color: var(--accent-yellow);
            box-shadow: inset 0 0 0 2px var(--accent-yellow);
        }

        .progress-circle.ghost {
            background: rgba(231, 76, 60, 0.15);
            color: var(--accent-red);
            box-shadow: inset 0 0 0 2px var(--accent-red);
        }

        .charts-section {
            margin-top: 60px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--text-primary);
        }

        .chart-container {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            animation: cardFade 0.6s ease-out 0.3s both;
        }

        .chart-container:hover {
            background: var(--glass-hover);
            border-color: var(--accent-blue);
        }

        svg {
            width: 100%;
            height: auto;
        }

        .team-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .team-stat-box {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .team-stat-box:hover {
            transform: translateY(-3px);
            background: var(--glass-hover);
        }

        .team-stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .team-stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        @media (max-width: 1200px) {
            .header h1 { font-size: 2.5rem; }
            .stats-grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        }

        @media (max-width: 768px) {
            .container { padding: 20px 15px; }
            .header { flex-direction: column; gap: 20px; text-align: center; }
            .header h1 { font-size: 2rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .chart-container { padding: 20px; }
            .section-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Coach Dashboard</h1>
            <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">🌙</button>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="charts-section">
            <h2 class="section-title">Tendances 9 Semaines</h2>
            <div class="chart-container">
                <svg viewBox="0 0 1000 400" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <linearGradient id="lineGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.3" />
                            <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0" />
                        </linearGradient>
                    </defs>
                    <polyline points="50,350 150,280 250,260 350,240 450,200 550,180 650,160 750,140 850,120 950,100"
                              fill="none" stroke="#ff6b35" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" />
                    <polygon points="50,350 150,280 250,260 350,240 450,200 550,180 650,160 750,140 850,120 950,100 950,400 50,400"
                             fill="url(#lineGrad1)" />
                    <line x1="50" y1="100" x2="950" y2="100" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="5,5" />
                    <line x1="50" y1="200" x2="950" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="5,5" />
                    <line x1="50" y1="300" x2="950" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="5,5" />
                    <line x1="50" y1="380" x2="950" y2="380" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
                    <text x="50" y="395" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">S1</text>
                    <text x="950" y="395" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">S9</text>
                    <text x="20" y="105" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="end">100%</text>
                    <text x="20" y="385" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="end">0%</text>
                </svg>
            </div>

            <h2 class="section-title" style="margin-top: 50px;">Statistiques Équipe</h2>
            <div class="team-stats" id="teamStats"></div>
        </div>
    </div>

    <script>
        const members = [
            { name: 'Marie Giguère', successRate: 91, engagement: 'engagement', streak: 12 },
            { name: 'Alex Delorey', successRate: 77, engagement: 'fading', streak: 5 },
            { name: 'Joseph Delorey', successRate: 83, engagement: 'engagement', streak: 8 },
            { name: 'Chantal Felteau', successRate: 75, engagement: 'fading', streak: 3 },
            { name: 'Danielle Delorey', successRate: 82, engagement: 'engagement', streak: 10 }
        ];

        const emojis = { 'feu': '🔥', 'engagement': '🟢', 'fading': '🟡', 'ghost': '🔴' };
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        const savedTheme = localStorage.getItem('theme') || 'dark';
        htmlElement.setAttribute('data-theme', savedTheme);
        updateThemeButton();

        themeToggle.addEventListener('click', () => {
            const current = htmlElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton();
        });

        function updateThemeButton() {
            const theme = htmlElement.getAttribute('data-theme');
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function renderStats() {
            const grid = document.getElementById('statsGrid');
            const fragment = document.createDocumentFragment();

            members.forEach(member => {
                const card = document.createElement('div');
                card.className = 'stat-card';

                const nameEl = document.createElement('div');
                nameEl.className = 'member-name';
                nameEl.textContent = member.name;

                const badgeEl = document.createElement('div');
                badgeEl.className = `engagement-badge ${member.engagement}`;
                badgeEl.textContent = `${emojis[member.engagement]} ${member.engagement.toUpperCase()}`;

                const row1 = document.createElement('div');
                row1.className = 'stat-row';
                const label1 = document.createElement('span');
                label1.className = 'stat-label';
                label1.textContent = 'Taux de Réussite';
                const value1 = document.createElement('span');
                value1.className = 'stat-value';
                value1.textContent = `${member.successRate}%`;
                row1.appendChild(label1);
                row1.appendChild(value1);

                const row2 = document.createElement('div');
                row2.className = 'stat-row';
                const label2 = document.createElement('span');
                label2.className = 'stat-label';
                label2.textContent = 'Streak';
                const circle = document.createElement('span');
                circle.className = `progress-circle ${member.engagement}`;
                circle.textContent = `${member.streak}j`;
                row2.appendChild(label2);
                row2.appendChild(circle);

                card.appendChild(nameEl);
                card.appendChild(badgeEl);
                card.appendChild(row1);
                card.appendChild(row2);
                fragment.appendChild(card);
            });

            grid.appendChild(fragment);
        }

        function renderTeamStats() {
            const container = document.getElementById('teamStats');
            const avgSuccess = (members.reduce((sum, m) => sum + m.successRate, 0) / members.length).toFixed(1);
            const totalStreak = members.reduce((sum, m) => sum + m.streak, 0);
            const activeMembers = members.filter(m => ['feu', 'engagement'].includes(m.engagement)).length;

            const stats = [
                { label: 'Moyenne Réussite', value: `${avgSuccess}%` },
                { label: 'Membres Actifs', value: `${activeMembers}/5` },
                { label: 'Total Streaks', value: `${totalStreak}j` },
                { label: 'Période', value: 'S1-S9' }
            ];

            const fragment = document.createDocumentFragment();
            stats.forEach(stat => {
                const box = document.createElement('div');
                box.className = 'team-stat-box';

                const label = document.createElement('div');
                label.className = 'team-stat-label';
                label.textContent = stat.label;

                const value = document.createElement('div');
                value.className = 'team-stat-value';
                value.textContent = stat.value;

                box.appendChild(label);
                box.appendChild(value);
                fragment.appendChild(box);
            });

            container.appendChild(fragment);
        }

        renderStats();
        renderTeamStats();
    </script>
</body>
</html>
